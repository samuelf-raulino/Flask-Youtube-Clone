<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>YouTube - Login</title>

    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            color: #000;
        }

        a {
            color: #0033cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #cc0000;
            margin-bottom: 15px;
        }

        .logo span {
            color: #000;
        }

        .container {
            width: 500px;
            margin: 50px auto;
        }

        table {
            border: 1px solid #cccccc;
            width: 100%;
            background-color: #f9f9f9;
        }

        th {
            background-color: #eeeeee;
            font-weight: bold;
            text-align: left;
            padding: 6px;
            font-size: 13px;
        }

        td {
            padding: 6px;
        }

        input {
            width: 95%;
            font-size: 12px;
        }

        button {
            font-size: 12px;
            padding: 3px 8px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">
            You<span>Tube</span>
        </div>

        <form method="POST">
            <table>
                <tr>
                    <th colspan="2">Entrar</th>
                </tr>

                <tr>
                    <td>User:</td>
                    <td><input name="user"></td>
                </tr>

                <tr>
                    <td>Senha:</td>
                    <td><input name="senha" type="password"></td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <button type="submit">Entrar</button>
                    </td>
                </tr>
            </table>
        </form>

        <br>
        <a href="#">Criar uma conta</a>

    </div>

    <div class="footer">
        © 2005 YouTube, Inc.
    </div>

</body>
</html>
